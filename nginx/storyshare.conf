# StoryShare Nginx 反向代理配置
# 将此文件复制到 ECS 的 /etc/nginx/conf.d/storyshare.conf
#
# 架构说明：
#   用户 → Cloudflare (HTTPS) → ECS Nginx (80/443) → localhost:3000 (Express)

# ============================================
# HTTP (80 端口) - 自动跳转到 HTTPS
# ============================================
server {
    listen 80;
    server_name api.fugufog.top;   # 替换为你的域名

    # 将所有 HTTP 请求重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# ============================================
# HTTPS (443 端口) - 反向代理到 Express (3000)
# ============================================
server {
    listen 443 ssl http2;
    server_name api.fugufog.top;   # 替换为你的域名

    # ---- SSL 证书配置 ----
    # 方式 A: 使用 Cloudflare Origin CA 证书（推荐，免费 15 年）
    #   1. Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate
    #   2. 下载证书和私钥，上传到 ECS
    ssl_certificate     /etc/nginx/ssl/api.fugufog.top.pem;
    ssl_certificate_key /etc/nginx/ssl/api.fugufog.top.key;

    # 方式 B: 使用 Let's Encrypt 证书（免费 90 天，需 certbot 自动续期）
    # ssl_certificate     /etc/letsencrypt/live/api.fugufog.top/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.fugufog.top/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 日志
    access_log /var/log/nginx/storyshare-access.log;
    error_log  /var/log/nginx/storyshare-error.log;

    # 客户端请求大小限制（上传图片等）
    client_max_body_size 10M;

    # ---- 反向代理到 Express (localhost:3000) ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # 传递原始请求信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果将来需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # API 路径专用缓存策略
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # API 不缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
