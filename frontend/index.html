<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryShare - 分享你的故事</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-left">
        <a href="/" class="logo">StoryShare</a>
        <div class="nav-tabs">
          <button class="nav-tab active" data-tab="story">故事</button>
          <button class="nav-tab" data-tab="quote">短句</button>
          <button class="nav-tab" data-tab="profile">个人中心</button>
          <button class="nav-tab nav-tab-admin" data-tab="users" style="display:none;">用户管理</button>
        </div>
      </div>
      <button class="hamburger" id="hamburgerBtn" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-right" id="navRight">
        <span id="userInfo" class="user-info" style="display:none;">
          <span id="username" class="user-name"></span>
          <button id="logoutNavBtn" class="btn btn-sm btn-logout-nav" title="退出登录">退出</button>
        </span>
        <div id="authButtons">
          <button id="showLoginBtn" class="btn btn-sm">登录</button>
          <button id="showRegisterBtn" class="btn btn-sm btn-primary">注册</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="container">
    <!-- 公告栏 -->
    <section id="announcementBoard" class="announcement-board">
      <div class="announcement-header">
        <h2 class="announcement-title">公告栏</h2>
        <div id="announcementAdmin" class="announcement-admin admin-only" style="display:none;">
          <input type="text" id="newThemeInput" class="theme-input" placeholder="输入今日主题..." maxlength="100">
          <button id="addThemeBtn" class="btn btn-sm btn-primary">发布主题</button>
        </div>
      </div>
      <div id="announcementList" class="announcement-list">
        <p class="empty-message">暂无公告</p>
      </div>
    </section>

    <!-- 发布区域 -->
    <section id="publishSection" class="publish-section" style="display:none;">
      <h2>发布新内容</h2>
      <form id="publishForm">
        <div class="form-group">
          <select id="postCategory" class="form-select">
            <option value="story">故事</option>
            <option value="quote">短句</option>
          </select>
        </div>
        <div class="form-group">
          <select id="postTheme" class="form-select">
            <option value="">选择主题（可选）</option>
          </select>
        </div>
        <div class="form-group">
          <textarea id="postContent" placeholder="写下你的故事或短句..." maxlength="500" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">发布</button>
      </form>
    </section>

    <!-- 筛选栏 -->
    <section id="filterBar" class="filter-bar">
      <div class="filter-row">
        <div class="filter-item">
          <label class="filter-label">主题</label>
          <select id="filterTheme" class="filter-select">
            <option value="">全部主题</option>
          </select>
        </div>
        <div class="filter-item">
          <label class="filter-label">开始日期</label>
          <input type="date" id="filterDateFrom" class="filter-input">
        </div>
        <div class="filter-item">
          <label class="filter-label">结束日期</label>
          <input type="date" id="filterDateTo" class="filter-input">
        </div>
        <div class="filter-item">
          <label class="filter-label">作者</label>
          <input type="text" id="filterUsername" class="filter-input" placeholder="搜索作者...">
        </div>
        <div class="filter-item">
          <label class="filter-label">内容搜索</label>
          <input type="text" id="filterSearch" class="filter-input" placeholder="搜索内容关键词...">
        </div>
        <div class="filter-actions">
          <button id="applyFilterBtn" class="btn btn-sm btn-primary">筛选</button>
          <button id="resetFilterBtn" class="btn btn-sm">重置</button>
        </div>
      </div>
    </section>

    <!-- 故事标签页 -->
    <section id="storySection" class="tab-content">
      <div class="board">
        <div class="board-header">
          <h2 class="board-title">故事</h2>
          <button id="exportStoryBtn" class="btn btn-sm btn-warning admin-only" style="display:none;">下载故事 Excel</button>
        </div>
        <div id="storyList" class="post-list"></div>
      </div>
      <div id="storyPagination" class="pagination"></div>
    </section>

    <!-- 短句标签页 -->
    <section id="quoteSection" class="tab-content" style="display:none;">
      <div class="board">
        <div class="board-header">
          <h2 class="board-title">短句</h2>
          <button id="exportQuoteBtn" class="btn btn-sm btn-warning admin-only" style="display:none;">下载短句 Excel</button>
        </div>
        <div id="quoteList" class="post-list"></div>
      </div>
      <div id="quotePagination" class="pagination"></div>
    </section>

    <!-- 个人中心标签页 -->
    <section id="profileSection" class="tab-content" style="display:none;">
      <div class="board">
        <h2 class="board-title">个人中心</h2>

        <div class="profile-block">
          <h3>修改昵称</h3>
          <form id="changeNicknameForm">
            <div class="form-group">
              <input type="text" id="newNickname" placeholder="新昵称（1-20个字符）" required>
            </div>
            <button type="submit" class="btn btn-primary">确认修改</button>
          </form>
        </div>

        <div class="profile-block">
          <h3>修改密码</h3>
          <form id="changePasswordForm">
            <div class="form-group">
              <input type="password" id="oldPassword" placeholder="当前密码" required>
            </div>
            <div class="form-group">
              <input type="password" id="newPassword" placeholder="新密码（至少6个字符）" required>
            </div>
            <button type="submit" class="btn btn-primary">确认修改</button>
          </form>
        </div>

      </div>
    </section>

    <!-- 用户管理标签页（管理员） -->
    <section id="usersSection" class="tab-content" style="display:none;">
      <div class="board">
        <h2 class="board-title">用户管理</h2>
        <div id="userManageContent">
          <p class="loading-text">加载中...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- 登录模态框 -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>登录</h2>
      <form id="loginForm">
        <div class="form-group">
          <input type="text" id="loginUsername" placeholder="用户名" required>
        </div>
        <div class="form-group">
          <input type="password" id="loginPassword" placeholder="密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>
      <p class="modal-footer">还没有账号？<a href="#" id="switchToRegister">立即注册</a></p>
    </div>
  </div>

  <!-- 注册模态框 -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>注册</h2>
      <form id="registerForm">
        <div class="form-group">
          <input type="text" id="registerUsername" placeholder="用户名（2-20个字符）" required>
        </div>
        <div class="form-group">
          <input type="password" id="registerPassword" placeholder="密码（至少6个字符）" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">注册</button>
      </form>
      <p class="modal-footer">已有账号？<a href="#" id="switchToLogin">立即登录</a></p>
    </div>
  </div>

  <!-- 编辑文章模态框 -->
  <div id="editPostModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>编辑内容</h2>
      <form id="editPostForm">
        <div class="form-group">
          <select id="editPostCategory" class="form-select">
            <option value="story">故事</option>
            <option value="quote">短句</option>
          </select>
        </div>
        <div class="form-group">
          <select id="editPostTheme" class="form-select">
            <option value="">选择主题（可选）</option>
          </select>
        </div>
        <div class="form-group">
          <textarea id="editPostContent" placeholder="编辑你的内容..." maxlength="500" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">保存修改</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <p>StoryShare &copy; 2024 - 分享你的故事</p>
  </footer>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
